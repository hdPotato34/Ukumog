name: Engine Checks

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  engine-preflight:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Node dependencies
        run: npm ci

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r model-server/requirements-serving.txt
          python -m pip install -e ./ukumog-engine

      - name: Run engine preflight
        run: npm run test:engine-preflight
