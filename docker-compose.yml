services:
  anti-gomoku-room-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: anti-gomoku-room-server
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 8787
      UKUMOG_HOST: 127.0.0.1
      UKUMOG_PORT: 8011
    ports:
      - "8787:8787"
      - "8011:8011"
    healthcheck:
      test:
        - CMD
        - /usr/local/bin/healthcheck.sh
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
