services:
  anti-gomoku-room-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: anti-gomoku-room-server
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 8787
      UKUMOG_ENGINE_ROOT: /app/vendor/ukumog-engine
      UKUMOG_PYTHON: python3
    ports:
      - "8787:8787"
    volumes:
      - ./data:/app/data
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - const http=require('http');const req=http.get({host:'127.0.0.1',port:process.env.PORT||8787,path:'/health'},res=>process.exit(res.statusCode===200?0:1));req.on('error',()=>process.exit(1));req.setTimeout(3000,()=>{req.destroy();process.exit(1);});
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
